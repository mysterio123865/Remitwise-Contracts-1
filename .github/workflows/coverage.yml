name: Coverage

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  coverage:
    name: Generate coverage report
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.81.0
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --all-features --lcov --output-path target/llvm-cov/lcov.info

      - name: Write coverage summary
        run: cargo llvm-cov report --summary-only | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Generate HTML report
        run: cargo llvm-cov report --html --output-dir target/llvm-cov/html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            target/llvm-cov/html
            target/llvm-cov/lcov.info
          if-no-files-found: error
